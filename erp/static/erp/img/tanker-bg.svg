<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Camion citerne sur route">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102a2a"/>
      <stop offset="55%" stop-color="#1d3f3b"/>
      <stop offset="100%" stop-color="#2d4f40"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0b35f" stop-opacity="0.95"/>
